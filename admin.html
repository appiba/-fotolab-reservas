<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHOTO LAB | Admin Agenda</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #ffffff;
      color: #111;
      padding: 20px;
    }

    .app {
      max-width: 540px;
      margin: auto;
    }

    .logo {
      width: 140px;
      display: block;
      margin: 20px auto 15px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 30px;
      font-weight: 900;
    }

    .header p {
      color: #555;
      margin-top: 6px;
    }

    .card, .hour {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      font-weight: 900;
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid #ddd;
      background: #fafafa;
      font-size: 15px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      margin-top: 8px;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: #ff1f12;
      color: #fff;
      font-weight: 900;
      font-size: 15px;
      cursor: pointer;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .box {
      background: #111;
      color: white;
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .box span {
      display: block;
      font-size: 12px;
      color: #aaa;
    }

    .box strong {
      display: block;
      margin-top: 5px;
      font-size: 24px;
      color: #ff1f12;
    }

    .hour-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .time {
      font-size: 22px;
      font-weight: 900;
      color: #111;
    }

    .date {
      font-size: 13px;
      color: #777;
      margin-top: 4px;
      font-weight: 700;
    }

    .badge {
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .free {
      background: #e8f8ee;
      color: #157347;
    }

    .busy {
      background: #ffe9e7;
      color: #c1121f;
    }

    .details {
      margin-top: 12px;
      background: #fafafa;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .hidden {
      display: none;
    }

    .error {
      color: #ff1f12;
      font-weight: 900;
      text-align: center;
      margin-top: 10px;
    }

    .empty {
      text-align: center;
      color: #777;
      padding: 20px;
    }
  </style>
</head>

<body>
  <main class="app">

    <img src="logo.png" alt="PHOTO LAB" class="logo">

    <section class="header">
      <h1>Agenda Admin</h1>
      <p>PHOTO LAB · Reservas y horarios</p>
    </section>

    <section id="loginCard" class="card">
      <label>Clave de administrador</label>
      <input type="password" id="clave" placeholder="Ingresa la clave">
      <button onclick="entrarAdmin()">Ingresar</button>
      <div id="loginError" class="error"></div>
    </section>

    <section id="adminPanel" class="hidden">

      <section class="card">
        <label>Modo de vista</label>
        <select id="modoVista" onchange="cargarAgenda()">
          <option value="dia">Ver por día seleccionado</option>
          <option value="todas">Ver todas las reservas próximas</option>
        </select>

        <label>Selecciona fecha</label>
        <input type="date" id="fechaFiltro">

        <button onclick="cargarAgenda()">Actualizar agenda</button>
      </section>

      <section class="summary">
        <div class="box">
          <span>Reservas</span>
          <strong id="totalReservas">0</strong>
        </div>
        <div class="box">
          <span>Libres</span>
          <strong id="totalLibres">0</strong>
        </div>
      </section>

      <section id="agenda"></section>

    </section>

  </main>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx3f-l4PUpb7pwB1CtCsWLE8SQFM5aTwFzomLX6PHkeUNZFW0LHJRDBxiVYRwa4LCyC7w/exec";
    const CLAVE_ADMIN = "photolab198724@";

    const HORARIOS = [
      "09:00","09:30","10:00","10:30","11:00","11:30",
      "12:00","12:30","13:00","13:30","14:00","14:30",
      "15:00","15:30","16:00","16:30","17:00","17:30",
      "18:00","18:30","19:00","19:30","20:00"
    ];

    function entrarAdmin() {
      const clave = document.getElementById("clave").value.trim();
      const error = document.getElementById("loginError");

      if (clave !== CLAVE_ADMIN) {
        error.textContent = "Clave incorrecta.";
        return;
      }

      document.getElementById("loginCard").classList.add("hidden");
      document.getElementById("adminPanel").classList.remove("hidden");

      const hoy = new Date().toISOString().split("T")[0];
      document.getElementById("fechaFiltro").value = hoy;

      cargarAgenda();
    }

    function normalizarFecha(fecha) {
      if (!fecha) return "";

      const texto = String(fecha).trim();

      if (texto.includes("/")) {
        const partes = texto.split("/");
        if (partes.length === 3) {
          return `${partes[2]}-${partes[1].padStart(2, "0")}-${partes[0].padStart(2, "0")}`;
        }
      }

      return texto.substring(0, 10);
    }

    function normalizarHora(hora) {
      if (!hora) return "";
      const texto = String(hora).trim();
      if (texto.includes(":")) {
        const partes = texto.split(":");
        return `${partes[0].padStart(2, "0")}:${partes[1].substring(0,2).padStart(2, "0")}`;
      }
      return texto;
    }

    function renderReserva(reserva) {
      const card = document.createElement("div");
      card.className = "hour";

      card.innerHTML = `
        <div class="hour-top">
          <div>
            <div class="time">${normalizarHora(reserva.hora)}</div>
            <div class="date">${normalizarFecha(reserva.fecha)}</div>
          </div>
          <div class="badge busy">OCUPADO</div>
        </div>

        <div class="details">
          <strong>Cliente:</strong> ${reserva.nombre || ""}<br>
          <strong>Cédula:</strong> ${reserva.cedula || ""}<br>
          <strong>Celular:</strong> ${reserva.celular || ""}<br>
          <strong>Sesión:</strong> ${reserva.sesion || ""}<br>
          <strong>Personas:</strong> ${reserva.personas || ""}<br>
          <strong>Total:</strong> $${reserva.total || "0"}<br>
          <strong>Estado:</strong> ${reserva.estado || "PENDIENTE"}
        </div>
      `;

      return card;
    }

    async function cargarAgenda() {
      const agenda = document.getElementById("agenda");
      const fechaSeleccionada = document.getElementById("fechaFiltro").value;
      const modo = document.getElementById("modoVista").value;

      agenda.innerHTML = '<div class="card empty">Cargando agenda...</div>';

      try {
        const res = await fetch(API_URL + "?t=" + Date.now());
        const reservasRaw = await res.json();

        const reservas = Array.isArray(reservasRaw) ? reservasRaw : [];

        reservas.forEach(r => {
          r.fecha = normalizarFecha(r.fecha);
          r.hora = normalizarHora(r.hora);
        });

        let lista = [];

        if (modo === "todas") {
          const hoy = new Date().toISOString().split("T")[0];
          lista = reservas
            .filter(r => r.fecha >= hoy)
            .sort((a, b) => (a.fecha + a.hora).localeCompare(b.fecha + b.hora));

          document.getElementById("totalLibres").textContent = "-";
        } else {
          lista = reservas
            .filter(r => r.fecha === fechaSeleccionada)
            .sort((a, b) => a.hora.localeCompare(b.hora));

          document.getElementById("totalLibres").textContent = HORARIOS.length - lista.length;
        }

        document.getElementById("totalReservas").textContent = lista.length;

        agenda.innerHTML = "";

        if (lista.length === 0) {
          agenda.innerHTML = '<div class="card empty">No hay reservas para esta vista.</div>';
          return;
        }

        if (modo === "dia") {
          HORARIOS.forEach(hora => {
            const reserva = lista.find(r => r.hora === hora);

            if (reserva) {
              agenda.appendChild(renderReserva(reserva));
            } else {
              const libre = document.createElement("div");
              libre.className = "hour";
              libre.innerHTML = `
                <div class="hour-top">
                  <div class="time">${hora}</div>
                  <div class="badge free">LIBRE</div>
                </div>
              `;
              agenda.appendChild(libre);
            }
          });
        } else {
          lista.forEach(reserva => {
            agenda.appendChild(renderReserva(reserva));
          });
        }

      } catch (error) {
        agenda.innerHTML = '<div class="card empty">Error al cargar la agenda.</div>';
      }
    }
  </script>

</body>
</html>
