<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHOTO LAB | Admin Agenda</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #ffffff;
      color: #111;
      padding: 20px;
    }

    .app {
      max-width: 520px;
      margin: auto;
    }

    .logo {
      width: 140px;
      display: block;
      margin: 20px auto 15px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 30px;
      font-weight: 900;
    }

    .header p {
      color: #555;
      margin-top: 6px;
    }

    .card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      font-weight: 900;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid #ddd;
      background: #fafafa;
      font-size: 15px;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: #ff1f12;
      color: #fff;
      font-weight: 900;
      font-size: 15px;
      cursor: pointer;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .box {
      background: #111;
      color: white;
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .box span {
      display: block;
      font-size: 12px;
      color: #aaa;
    }

    .box strong {
      display: block;
      margin-top: 5px;
      font-size: 24px;
      color: #ff1f12;
    }

    .hour {
      border: 1px solid #eee;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 10px;
      background: #fff;
    }

    .hour-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .time {
      font-size: 22px;
      font-weight: 900;
      color: #111;
    }

    .badge {
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
    }

    .free {
      background: #e8f8ee;
      color: #157347;
    }

    .busy {
      background: #ffe9e7;
      color: #c1121f;
    }

    .details {
      margin-top: 12px;
      background: #fafafa;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .details strong {
      color: #111;
    }

    .hidden {
      display: none;
    }

    .error {
      color: #ff1f12;
      font-weight: 900;
      text-align: center;
      margin-top: 10px;
    }

    .empty {
      text-align: center;
      color: #777;
      padding: 20px;
    }
  </style>
</head>

<body>

  <main class="app">

    <img src="logo.png" alt="PHOTO LAB" class="logo">

    <section class="header">
      <h1>Agenda Admin</h1>
      <p>PHOTO LAB · Control de reservas</p>
    </section>

    <section id="loginCard" class="card">
      <label>Clave de administrador</label>
      <input type="password" id="clave" placeholder="Ingresa la clave">
      <button onclick="entrarAdmin()">Ingresar</button>
      <div id="loginError" class="error"></div>
    </section>

    <section id="adminPanel" class="hidden">

      <section class="card">
        <label>Selecciona fecha</label>
        <input type="date" id="fechaFiltro">
        <button onclick="cargarAgenda()">Actualizar agenda</button>
      </section>

      <section class="summary">
        <div class="box">
          <span>Reservas</span>
          <strong id="totalReservas">0</strong>
        </div>
        <div class="box">
          <span>Libres</span>
          <strong id="totalLibres">0</strong>
        </div>
      </section>

      <section id="agenda"></section>

    </section>

  </main>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx3f-l4PUpb7pwB1CtCsWLE8SQFM5aTwFzomLX6PHkeUNZFW0LHJRDBxiVYRwa4LCyC7w/exec";

    const CLAVE_ADMIN = "photolab2026";

    const HORARIOS = [
      "09:00","09:30","10:00","10:30","11:00","11:30",
      "12:00","12:30","13:00","13:30","14:00","14:30",
      "15:00","15:30","16:00","16:30","17:00","17:30",
      "18:00","18:30","19:00","19:30","20:00"
    ];

    function entrarAdmin() {
      const clave = document.getElementById("clave").value.trim();
      const error = document.getElementById("loginError");

      if (clave !== CLAVE_ADMIN) {
        error.textContent = "Clave incorrecta.";
        return;
      }

      document.getElementById("loginCard").classList.add("hidden");
      document.getElementById("adminPanel").classList.remove("hidden");

      const hoy = new Date().toISOString().split("T")[0];
      document.getElementById("fechaFiltro").value = hoy;

      cargarAgenda();
    }

    async function cargarAgenda() {
      const agenda = document.getElementById("agenda");
      const fechaSeleccionada = document.getElementById("fechaFiltro").value;

      agenda.innerHTML = '<div class="card empty">Cargando agenda...</div>';

      try {
        const res = await fetch(API_URL);
        const reservas = await res.json();

        const reservasDia = reservas.filter(r => r.fecha === fechaSeleccionada);

        document.getElementById("totalReservas").textContent = reservasDia.length;
        document.getElementById("totalLibres").textContent = HORARIOS.length - reservasDia.length;

        agenda.innerHTML = "";

        HORARIOS.forEach(hora => {
          const reserva = reservasDia.find(r => r.hora === hora);

          const card = document.createElement("div");
          card.className = "hour";

          if (reserva) {
            card.innerHTML = `
              <div class="hour-top">
                <div class="time">${hora}</div>
                <div class="badge busy">OCUPADO</div>
              </div>

              <div class="details">
                <strong>Cliente:</strong> ${reserva.nombre || ""}<br>
                <strong>Cédula:</strong> ${reserva.cedula || ""}<br>
                <strong>Celular:</strong> ${reserva.celular || ""}<br>
                <strong>Sesión:</strong> ${reserva.sesion || ""}<br>
                <strong>Personas:</strong> ${reserva.personas || ""}<br>
                <strong>Total:</strong> $${reserva.total || "0"}<br>
                <strong>Estado:</strong> ${reserva.estado || "PENDIENTE"}
              </div>
            `;
          } else {
            card.innerHTML = `
              <div class="hour-top">
                <div class="time">${hora}</div>
                <div class="badge free">LIBRE</div>
              </div>
            `;
          }

          agenda.appendChild(card);
        });

      } catch (error) {
        agenda.innerHTML = '<div class="card empty">Error al cargar la agenda.</div>';
      }
    }
  </script>

</body>
</html>
